<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Royal Furniture placeholder</title>
  <desc id="desc">A neutral furniture image placeholder used when a product image cannot be loaded.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#faf7f2"/>
      <stop offset="1" stop-color="#ede3d5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="250" y="470" width="700" height="120" rx="16" fill="#5c3a21"/>
  <rect x="300" y="350" width="600" height="170" rx="24" fill="#8c6644"/>
  <rect x="330" y="375" width="160" height="120" rx="18" fill="#d7c3a9"/>
  <rect x="520" y="375" width="160" height="120" rx="18" fill="#d7c3a9"/>
  <rect x="710" y="375" width="160" height="120" rx="18" fill="#d7c3a9"/>
  <rect x="320" y="590" width="70" height="110" rx="12" fill="#4a2e1a"/>
  <rect x="810" y="590" width="70" height="110" rx="12" fill="#4a2e1a"/>
  <text x="600" y="755" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#382314">Royal Furniture</text>
</svg>
